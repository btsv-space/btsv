services:
  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: https://api.example.com/api
        VITE_PROXY_URL: https://proxy.example.com
    ports:
      - "8103:80"
    restart: unless-stopped
    depends_on:
      - api
      - proxy

  api:
    build:
      context: ./apps/api
    ports:
      - "8101:8101"
    restart: unless-stopped
    environment:
      PORT: "8101"
      DATA_DIR: /data
      ALLOW_ORIGIN: https://app.example.com
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      COOKIE_DOMAIN: .example.com
    volumes:
      - api-data:/data

  proxy:
    build:
      context: ./apps/proxy
    ports:
      - "8102:8102"
    restart: unless-stopped
    environment:
      PORT: "8102"
      ALLOW_ORIGIN: https://app.example.com
      LOG_LEVEL: info


volumes:
  api-data:
